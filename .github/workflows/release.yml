name: Release

# Best practice 2026: Trigger on GitHub Release "published" event.
# This is more secure than pushing tags directly because:
# - Releases can be drafted and reviewed before publishing.
# - It provides a clean UI and changelog.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.8.0)'
        required: true
        type: string

# SECURITY: Never grant top-level permissions.
# All jobs must explicitly declare what they need.
permissions: {}

env:
  PROJECT_DIR: .

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # SECURITY: Use a GitHub Environment with protection rules (recommended)
    # Create an environment called "release" in repo Settings -> Environments
    # Add required reviewers and/or branch protection rules there.
    environment: release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: epochserver_x64.dll
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libepochserver_x64.so

    permissions:
      contents: read
      # Only needed if you enable attestations below
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        # SECURITY: Always pin to a full commit SHA, never a tag like @v4
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable (1.94.1) as of 2026-03-27
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: ${{ env.PROJECT_DIR }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

      # Optional but recommended in 2026: Generate SLSA-style provenance
      - name: Generate artifact attestation
        uses: actions/attest@109298582bf81ad578b4e72f0f0893b095a4a135
        with:
          subject-path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write          # Required to create/update releases
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          persist-credentials: false

      - name: Download all build artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          path: dist
          merge-multiple: true

      - name: Add example config
        run: cp EpochServer.example.ini dist/EpochServer.example.ini

      - name: Create GitHub Release and attach binaries
        # SECURITY: Pinned to full commit SHA
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb
        with:
          # When triggered by release event, use the release that was just published.
          # For manual dispatch, you can pass the tag via inputs.
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          name: ${{ github.event.release.name || github.event.inputs.tag }}
          body: ${{ github.event.release.body || 'Automated build from main.' }}
          draft: false
          prerelease: ${{ github.event.release.prerelease || false }}
          files: |
            dist/epochserver_x64.dll
            dist/libepochserver_x64.so
            dist/EpochServer.example.ini
          # Generate release notes from commits since last release (nice to have)
          generate_release_notes: true

      # Optional: Attach attestations as release assets if desired
      - name: Upload attestations (if generated)
        if: always()
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            dist/*.sigstore.json
            dist/*.intoto.jsonl
        continue-on-error: true
